<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="seal-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d42f2f"/>
      <stop offset="100%" stop-color="#b71c1c"/>
    </linearGradient>
  </defs>
  <!-- 印章外框 -->
  <rect x="8" y="8" width="240" height="240" rx="36" fill="url(#seal-bg)" stroke="#8b0000" stroke-width="3"/>
  <!-- 内框线（篆刻边框效果） -->
  <rect x="20" y="20" width="216" height="216" rx="28" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
  <!-- 「爽」字 — 书法/篆刻风格 -->
  <g fill="white">
    <!-- 大 x 部分（爽的左半「大」） -->
    <path d="M94 64 Q90 90 72 110 Q68 115 74 118 Q78 120 82 115 Q88 105 92 95 L98 95 Q102 105 108 112 Q112 116 116 112 Q120 108 116 102 Q108 90 100 70 Q98 64 94 64Z" />
    <!-- 中间的「爻」部分 — 左 -->
    <path d="M108 80 Q118 75 128 78 Q132 80 130 85 Q128 90 118 90 Q112 90 108 85 Q106 82 108 80Z" />
    <!-- 中间的「爻」部分 — 右 -->
    <path d="M132 80 Q142 75 152 78 Q156 80 154 85 Q152 90 142 90 Q136 90 132 85 Q130 82 132 80Z" />
    <!-- 中间的「爻」下部分 — 左 -->
    <path d="M110 96 Q120 92 128 96 Q132 98 130 103 Q128 108 118 106 Q112 105 110 100 Q108 98 110 96Z" />
    <!-- 中间的「爻」下部分 — 右 -->
    <path d="M134 96 Q144 92 152 96 Q156 98 154 103 Q152 108 142 106 Q136 105 134 100 Q132 98 134 96Z" />
    <!-- 大 x 的右半（爽的右边「大」） -->
    <path d="M158 64 Q162 90 178 108 Q182 112 178 116 Q174 120 170 114 Q166 106 162 95 L156 95 Q150 108 144 115 Q140 119 136 114 Q132 110 138 104 Q146 94 152 72 Q154 64 158 64Z" />
    <!-- 爽左下角的小撇 -->
    <path d="M80 140 Q86 145 92 160 Q94 168 90 168 Q85 168 82 155 Q78 145 80 140Z" />
    <!-- 爽右下角的小撇 -->
    <path d="M162 140 Q168 145 174 160 Q176 168 172 168 Q167 168 164 155 Q160 145 162 140Z" />
  </g>
  <!-- 左下小印「文」 -->
  <rect x="86" y="180" width="84" height="30" rx="4" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <text x="128" y="201" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="14" font-family="serif">文</text>
</svg>
